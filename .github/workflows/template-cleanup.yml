name: Template cleanup

on:
  push:
    branches: [main]

jobs:
  cleanup:
    if: github.run_number == 1 && github.event.repository.name != '{{MODULE_ID}}'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Detect inherited placeholders
        run: |
          if grep -R "{{MODULE_ID}}" --include="*.json" --include="*.ts" --include="*.md" .; then
            echo "::warning::Placeholders still present. Run: node scripts/init-template.mjs"
          fi
